<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forge Games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{cursor:none!important;margin:0;padding:0;box-sizing:border-box}
:root{
  --p:#a855f7;--pd:#7c3aed;--ps:rgba(168,85,247,.18);--pb:rgba(168,85,247,.35);
  --bg:#0a0a0f;--s:#11111a;--s2:#18182a;--b:rgba(168,85,247,.15);--t:#e8e0ff;--m:#888;
}
body{color:var(--t);min-height:100vh;overflow-x:hidden;background:var(--bg);font-family:'Inter',sans-serif}
body.font-orbitron{font-family:'Orbitron',sans-serif!important}
body.font-inter{font-family:'Inter',sans-serif!important}
body.font-grotesk{font-family:'Space Grotesk',sans-serif!important}
body.font-rajdhani{font-family:'Rajdhani',sans-serif!important}
body.font-mono{font-family:'Share Tech Mono',monospace!important}
#cur-c{position:fixed;pointer-events:none;z-index:999999;transform:translate(-50%,-50%);width:18px;height:18px}
#cur-c::before,#cur-c::after{content:'';position:absolute;background:var(--p);border-radius:1px}
#cur-c::before{width:1.5px;height:100%;left:50%;top:0;transform:translateX(-50%)}
#cur-c::after{width:100%;height:1.5px;top:50%;left:0;transform:translateY(-50%)}
#cur-r{position:fixed;width:28px;height:28px;border-radius:50%;border:1px solid var(--pb);pointer-events:none;z-index:999998;transform:translate(-50%,-50%);transition:width .12s,height .12s}
#cur-r.click{width:16px;height:16px;border-color:var(--p)}
#splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9;gap:28px;background:var(--bg)}
.splash-logo{font-size:68px;font-weight:900;letter-spacing:-3px;color:#fff;text-shadow:0 0 50px rgba(168,85,247,.5),0 0 100px rgba(168,85,247,.2)}
.splash-sub{color:rgba(168,85,247,.5);font-size:11px;letter-spacing:5px;text-transform:uppercase}
.play-btn{background:transparent;color:var(--p);border:1px solid var(--pb);padding:13px 52px;font-size:14px;font-weight:700;border-radius:6px;letter-spacing:2px;text-transform:uppercase;transition:.25s;position:relative;overflow:hidden}
.play-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--ps),transparent);transform:translateX(-100%);transition:.5s}
.play-btn:hover::before{transform:translateX(100%)}
.play-btn:hover{border-color:var(--p);box-shadow:0 0 28px rgba(168,85,247,.3);color:#fff}
#app{display:none;position:relative;z-index:1}
header{padding:0 18px;height:54px;background:rgba(10,10,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;gap:10px}
.logo{font-size:20px;font-weight:900;letter-spacing:2px;color:#fff;flex-shrink:0;text-shadow:0 0 20px rgba(168,85,247,.4)}
.header-right{display:flex;align-items:center;gap:8px}
#search{background:var(--s2);border:1px solid var(--b);color:var(--t);padding:7px 14px;border-radius:6px;outline:none;width:160px;font-size:13px;transition:.2s;font-family:inherit}
#search:focus{border-color:var(--pb);width:195px;box-shadow:0 0 12px rgba(168,85,247,.15)}
#search::placeholder{color:rgba(168,85,247,.3)}
.icon-btn{background:var(--s2);border:1px solid var(--b);width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.icon-btn:hover{background:var(--ps);border-color:var(--pb)}
.icon-btn svg{width:16px;height:16px;fill:rgba(168,85,247,.6);transition:.2s}
.icon-btn:hover svg{fill:var(--p)}
#settings{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:#0d0d18;border-left:1px solid var(--b);z-index:5000;transition:right .3s ease-out;overflow-y:auto;padding:20px}
#settings.open{right:0}
.settings-title{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--pb);margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.settings-title button{background:none;border:none;color:rgba(168,85,247,.4);font-size:16px;line-height:1}
.settings-title button:hover{color:var(--p)}
.set-section{margin-bottom:20px}
.set-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(168,85,247,.4);margin-bottom:8px}
.set-options{display:flex;flex-wrap:wrap;gap:5px}
.set-opt{padding:6px 11px;border-radius:4px;border:1px solid var(--b);background:transparent;font-size:12px;font-weight:600;color:rgba(168,85,247,.5);transition:.2s}
.set-opt:hover{border-color:var(--pb);color:var(--p)}
.set-opt.active{border-color:var(--p);background:var(--ps);color:var(--p)}
#set-backdrop{position:fixed;inset:0;z-index:4999;display:none}
#set-backdrop.open{display:block}
.container{padding:14px}
.section-head{display:flex;align-items:center;gap:10px;margin:18px 0 10px}
.section-label{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(168,85,247,.4)}
.section-line{flex:1;height:1px;background:linear-gradient(to right,var(--b),transparent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:8px}
#featured{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
.game-card{position:relative;border-radius:10px;overflow:hidden;transition:transform .25s ease-out;border:1px solid rgba(168,85,247,.2);background:#0e0e1a}
.game-card:hover{transform:translateY(-4px);border-color:rgba(168,85,247,.55);box-shadow:0 8px 24px rgba(168,85,247,.15)}
.img-box{width:100%;aspect-ratio:4/3;overflow:hidden;position:relative;background:#12121f}
.game-card img{width:100%;height:100%;object-fit:cover;transition:.4s;display:block}
.game-card:hover img{transform:scale(1.06)}
.img-box::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(10,5,20,.8) 0%,transparent 55%);pointer-events:none}
.play-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.65);width:40px;height:40px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;z-index:3;box-shadow:0 0 20px rgba(168,85,247,.6)}
.play-badge svg{width:15px;height:15px;fill:#fff;margin-left:2px}
.game-card:hover .play-badge{opacity:1;transform:translate(-50%,-50%) scale(1)}
.title-bar{padding:9px 11px;background:#0e0e1a;border-top:1px solid var(--b);display:flex;align-items:center;gap:8px}
.card-dot{width:5px;height:5px;border-radius:50%;background:var(--b);flex-shrink:0;transition:.2s}
.game-card:hover .card-dot{background:var(--p);box-shadow:0 0 6px rgba(168,85,247,.7)}
.game-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize;color:var(--m);transition:.2s;font-family:inherit}
.game-card:hover .game-name{color:var(--t)}
#game-view{position:fixed;inset:0;background:#07070f;z-index:10000;display:none;flex-direction:column;transform-origin:center;height:100vh;width:100vw}
@keyframes gvClose{0%{opacity:1;transform:scale(1)}40%{opacity:1;transform:scale(1.03)}100%{opacity:0;transform:scale(.88)}}
#game-view.closing{animation:gvClose .32s ease-in forwards}
.top-nav{padding:0 16px;height:50px;background:rgba(7,7,15,.97);border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#display-name{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:2px;color:rgba(168,85,247,.5);font-family:inherit}
.nav-btns{display:flex;gap:8px;align-items:center}
.nav-btn{background:var(--s2);border:1px solid var(--b);width:36px;height:36px;border-radius:6px;transition:.2s;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:var(--ps);border-color:var(--pb)}
.nav-btn svg{width:16px;height:16px;fill:rgba(168,85,247,.5);transition:.2s}
.nav-btn:hover svg{fill:var(--p)}
@keyframes dlPulse{0%{transform:scale(1)}50%{transform:scale(.87)}100%{transform:scale(1)}}
.nav-btn.downloading{animation:dlPulse .35s ease}
.tab-btn{background:var(--s2);border:1px solid var(--b);height:36px;padding:0 12px;border-radius:6px;display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(168,85,247,.55);transition:.2s;white-space:nowrap;position:relative;overflow:hidden}
.tab-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--ps),transparent);transform:translateX(-100%);transition:.4s}
.tab-btn:hover::before{transform:translateX(100%)}
.tab-btn:hover{border-color:var(--pb);color:var(--p);box-shadow:0 0 12px rgba(168,85,247,.15)}
.tab-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.close-btn{width:36px;height:36px;border-radius:6px;background:var(--s2);border:1px solid rgba(255,80,80,.2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:.2s}
.close-btn:hover{background:rgba(255,60,60,.15);border-color:rgba(255,80,80,.5);box-shadow:0 0 12px rgba(255,60,60,.2)}
.close-x{width:14px;height:14px;position:relative}
.close-x::before,.close-x::after{content:'';position:absolute;width:100%;height:1.5px;background:rgba(255,100,100,.7);top:50%;left:0;border-radius:1px;transition:.2s}
.close-x::before{transform:translateY(-50%) rotate(45deg)}
.close-x::after{transform:translateY(-50%) rotate(-45deg)}
.close-btn:hover .close-x::before,.close-btn:hover .close-x::after{background:#ff6464}
.gframe-wrap{position:relative;flex:1;display:flex;min-height:0;overflow:hidden}
#gameFrame{flex:1;border:none;width:100%;height:100%;display:block;background:#fff}
.gframe-wrap::before{content:'';position:absolute;inset:0;border:2px solid rgba(168,85,247,.5);box-shadow:0 0 0 1px rgba(168,85,247,.1),0 0 50px rgba(168,85,247,.2),inset 0 0 30px rgba(168,85,247,.04);pointer-events:none;z-index:2;border-radius:2px;animation:pglow 3s ease-in-out infinite}
.gframe-wrap::after{content:'';position:absolute;inset:-8px;border:1px solid rgba(168,85,247,.1);box-shadow:0 0 80px rgba(168,85,247,.15);pointer-events:none;z-index:1;border-radius:6px;animation:pglow 3s ease-in-out infinite .9s}
@keyframes pglow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes nbp{0%,100%{opacity:1}50%{opacity:.3}}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#11111a;border:1px solid var(--b);color:var(--t);padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:99999;display:flex;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 4px 20px rgba(168,85,247,.15)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast svg{width:14px;height:14px;fill:var(--p);flex-shrink:0}
#new-banner{position:fixed;top:62px;left:50%;transform:translateX(-50%) translateY(-80px);background:#11111a;border:1px solid var(--b);color:var(--t);padding:10px 18px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transition:all .35s ease-out;pointer-events:none;z-index:99999;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(168,85,247,.15)}
#new-banner.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
#new-banner button{background:var(--ps);border:1px solid var(--b);color:var(--p);padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:.2s}
#new-banner button:hover{background:var(--pb);color:#fff}
.nb-dot{width:6px;height:6px;border-radius:50%;background:var(--p);flex-shrink:0;animation:nbp 1.2s ease infinite;box-shadow:0 0 6px var(--p)}
@keyframes nbp{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body class="font-inter">
<div id="cur-c"></div>
<div id="cur-r"></div>

<div id="splash">
  <div class="splash-logo">FORGE</div>
  <div class="splash-sub">Games</div>
  <button class="play-btn" onclick="launch()">&#9654;&nbsp; Play Games</button>
</div>

<div id="app">
  <header>
    <div class="logo">FORGE</div>
    <div class="header-right">
      <input type="text" id="search" placeholder="Search..." oninput="filter()">
      <button class="icon-btn" onclick="openSettings()">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.02 7.02 0 00-1.62-.94l-.36-2.54A.484.484 0 0014 2h-4a.484.484 0 00-.48.41l-.36 2.54a7.38 7.38 0 00-1.62.94l-2.39-.96a.48.48 0 00-.59.22L2.74 8.47a.47.47 0 00.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.05.24.27.41.49.41h4c.22 0 .43-.17.47-.41l.36-2.54a7.38 7.38 0 001.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 00-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
      </button>
    </div>
  </header>
  <div class="container">
    <div class="section-head"><span class="section-label">Top Picks</span><div class="section-line"></div></div>
    <div id="featured" class="grid"></div>
    <div class="section-head"><span class="section-label">All Games</span><div class="section-line"></div></div>
    <div id="main-grid" class="grid"></div>
  </div>
</div>

<div id="game-view">
  <div class="top-nav">
    <span id="display-name"></span>
    <div class="nav-btns">
      <button class="nav-btn" id="dl-btn" onclick="dlGame()">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 13.59V7h2v8.59l3.3-3.3 1.41 1.41L12 19.41l-5.71-5.71 1.41-1.41L11 15.59z"/></svg>
      </button>
      <button class="nav-btn" onclick="toggleFS()">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
      <button class="tab-btn" onclick="openInTab()">
        <svg viewBox="0 0 20 20" fill="none">
          <rect x="2" y="5" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M11 3h6v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 3L10.5 9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        New Tab
      </button>
      <button class="close-btn" onclick="closeGame()"><div class="close-x"></div></button>
    </div>
  </div>
  <div class="gframe-wrap">
    <iframe id="gameFrame" allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-orientation-lock allow-pointer-lock"></iframe>
  </div>
</div>

<div id="set-backdrop" onclick="closeSettings()"></div>
<div id="settings">
  <div class="settings-title">SETTINGS <button onclick="closeSettings()">&#10005;</button></div>
  <div class="set-section">
    <div class="set-label">Font</div>
    <div class="set-options">
      <div class="set-opt active" data-font="font-inter" onclick="setFont(this)">Inter</div>
      <div class="set-opt" data-font="font-orbitron" onclick="setFont(this)">Orbitron</div>
      <div class="set-opt" data-font="font-grotesk" onclick="setFont(this)">Grotesk</div>
      <div class="set-opt" data-font="font-rajdhani" onclick="setFont(this)">Rajdhani</div>
      <div class="set-opt" data-font="font-mono" onclick="setFont(this)">Mono</div>
    </div>
  </div>
</div>

<div id="new-banner">
  <div class="nb-dot"></div>
  <span id="nb-msg"></span>
  <button onclick="reloadGames()">Refresh</button>
  <button onclick="dismissBanner()" style="background:none;border:none;font-size:15px;padding:0 2px;color:rgba(168,85,247,.5)">&#10005;</button>
</div>

<div id="toast">
  <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
  Downloaded from Forge
</div>

<script>
const COVERS_BASE="https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
const HTML_BASE="https://cdn.jsdelivr.net/gh/freebuisness/html@main";
const ZONES_URL="https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json";
let games=[],curName="",curItem=null,curURL="",curHTML="";
let styleTag=null;

const cross=document.getElementById('cur-c'),ring=document.getElementById('cur-r');
let mx=0,my=0,rx=0,ry=0;
addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cross.style.left=mx+'px';cross.style.top=my+'px'});
addEventListener('mousedown',()=>ring.classList.add('click'));
addEventListener('mouseup',()=>ring.classList.remove('click'));
(function l(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(l)})();

function pick(sel,el){document.querySelectorAll(sel).forEach(e=>e.classList.remove('active'));el.classList.add('active')}
function setFont(el){pick('[data-font]',el);document.body.classList.remove('font-inter','font-orbitron','font-grotesk','font-rajdhani','font-mono');document.body.classList.add(el.dataset.font)}
function tog(a){['settings','set-backdrop'].forEach(id=>document.getElementById(id).classList.toggle('open',a))}
function openSettings(){tog(true)}
function closeSettings(){tog(false)}

function launch(){
  const w=window.open('about:blank','_blank');
  if(!w){alert('Allow popups!');return}
  const c=document.documentElement.cloneNode(true);
  c.querySelector('#splash').style.display='none';
  c.querySelector('#app').style.display='block';
  w.document.open();w.document.write('<!DOCTYPE html>'+c.outerHTML);w.document.close();
}

async function fetchZones(){
  try{
    const shaRes=await fetch('https://api.github.com/repos/freebuisness/assets/commits?t='+Date.now());
    if(shaRes.ok){const j=await shaRes.json();const sha=j[0]?.sha;if(sha)return(await fetch(`https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json?t=`+Date.now())).json()}
  }catch(e){}
  return(await fetch(ZONES_URL+'?t='+Date.now())).json();
}
async function init(){try{games=await fetchZones();draw(games)}catch(e){console.error(e)}}

function mkCard(item){
  const card=document.createElement('div');
  card.className='game-card';
  const img=item.cover.replace("{COVER_URL}",COVERS_BASE).replace("{HTML_URL}",HTML_BASE);
  card.innerHTML=`<div class="img-box"><img src="${img}" loading="lazy" alt="${item.name}"><div class="play-badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div><div class="title-bar"><div class="card-dot"></div><div class="game-name">${item.name}</div></div>`;
  card.onclick=()=>openGame(item);
  return card;
}
function draw(data){
  ['featured','main-grid'].forEach(id=>document.getElementById(id).innerHTML='');
  data.forEach(item=>document.getElementById(item.featured?'featured':'main-grid').appendChild(mkCard(item)));
}

async function openGame(item){
  curItem=item;curName=item.name;
  const url=item.url.replace("{COVER_URL}",COVERS_BASE).replace("{HTML_URL}",HTML_BASE);
  curURL=url;
  document.getElementById('display-name').innerText=item.name;
  const gv=document.getElementById('game-view');
  gv.classList.remove('closing');
  gv.style.display='flex';
  document.body.style.overflow='hidden';

  // Replace iframe entirely to kill any previous game's JS/audio/loops
  const wrap=document.querySelector('.gframe-wrap');
  const old=document.getElementById('gameFrame');
  if(old)old.remove();
  const f=document.createElement('iframe');
  f.id='gameFrame';
  f.allowFullscreen=true;
  f.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-orientation-lock allow-pointer-lock');
  f.style.cssText='flex:1;border:none;width:100%;height:100%;display:block;background:#fff';
  wrap.appendChild(f);

  try{
    const res=await fetch(url+'?t='+Date.now());
    if(!res.ok)throw new Error(res.status);
    const html=await res.text();
    curHTML=html;
    f.contentDocument.open();
    f.contentDocument.write(html);
    f.contentDocument.close();
  }catch(e){
    console.error(e);
    window.open(url,'_blank');
    gv.style.display='none';
    document.body.style.overflow='auto';
  }
}

function openInTab(){
  if(!curHTML&&!curURL)return;
  const w=window.open('about:blank','_blank');
  if(!w){alert('Allow popups!');return}
  if(curHTML){
    w.document.open();w.document.write(curHTML);w.document.close();
  }else{
    fetch(curURL+'?t='+Date.now()).then(r=>r.text()).then(html=>{
      w.document.open();w.document.write(html);w.document.close();
    });
  }
}

function closeGame(){
  const gv=document.getElementById('game-view');
  gv.classList.add('closing');
  gv.addEventListener('animationend',()=>{
    gv.style.display='none';
    gv.classList.remove('closing');
    // Replace iframe to fully stop any running game
    const wrap=document.querySelector('.gframe-wrap');
    const old=document.getElementById('gameFrame');
    if(old)old.remove();
    const f=document.createElement('iframe');
    f.id='gameFrame';
    f.allowFullscreen=true;
    f.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-orientation-lock allow-pointer-lock');
    f.style.cssText='flex:1;border:none;width:100%;height:100%;display:block;background:#fff';
    wrap.appendChild(f);
    document.body.style.overflow='auto';
    curName='';curItem=null;curURL='';curHTML='';
  },{once:true});
}

async function dlGame(){
  if(!curURL)return;
  const b=document.getElementById('dl-btn');
  b.classList.add('downloading');
  try{
    let html=curHTML;
    if(!html){const res=await fetch(curURL+'?t='+Date.now());html=await res.text();}
    const blob=new Blob([html],{type:'text/html'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=(curName.replace(/\s+/g,'_')||'game')+'.html';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  }catch(e){console.error(e)}
  b.addEventListener('animationend',()=>b.classList.remove('downloading'),{once:true});
  const t=document.getElementById('toast');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}

function toggleFS(){const f=document.getElementById('gameFrame');(f.requestFullscreen||f.webkitRequestFullscreen).call(f)}
function filter(){const q=document.getElementById('search').value.toLowerCase();draw(games.filter(g=>g.name.toLowerCase().includes(q)))}

function dismissBanner(){document.getElementById('new-banner').classList.remove('show')}
async function reloadGames(){
  dismissBanner();
  try{games=await fetchZones();const q=document.getElementById('search').value.toLowerCase();draw(q?games.filter(g=>g.name.toLowerCase().includes(q)):games)}catch(e){console.error(e)}
}

setInterval(async()=>{
  try{
    const fresh=await fetchZones();
    const known=new Set(games.map(g=>g.name));
    const newOnes=fresh.filter(g=>!known.has(g.name));
    if(!newOnes.length)return;
    games=fresh;
    newOnes.forEach(item=>{
      const card=mkCard(item);
      card.style.cssText='opacity:0;transform:translateY(14px)';
      document.getElementById(item.featured?'featured':'main-grid').appendChild(card);
      requestAnimationFrame(()=>{card.style.cssText='transition:opacity .5s,transform .5s;opacity:1;transform:translateY(0)'});
    });
    const n=newOnes.length;
    document.getElementById('nb-msg').textContent=`${n} new game${n>1?'s':''} added — ${newOnes.map(g=>g.name).join(', ')}`;
    document.getElementById('new-banner').classList.add('show');
    setTimeout(dismissBanner,8000);
  }catch(e){}
},30000);

addEventListener('keydown',e=>e.key==='Escape'&&closeGame());
init();
</script>
</body>
</html>
